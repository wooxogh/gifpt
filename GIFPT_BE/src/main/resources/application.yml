spring:
  application:
    name: gifpt
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: false
  sql:
    init:
      mode: never

server:
  port: 8080
  compression:
    enabled: true

logging:
  level:
    org.hibernate.SQL: debug         # 실행되는 SQL
    org.hibernate.orm.jdbc.bind: trace  # 바인딩 파라미터 (개발 중에만!)
    com.zaxxer.hikari: info
    root: info

gifpt:
  jwt:
    secret: ${GIFPT_JWT_SECRET}
    expires-in-ms: 3600000           # 1시간
    refresh-expires-in-ms: 1209600000  # 14일
    issuer: gifpt
    header: Authorization       # 액세스 토큰을 담는 헤더
    prefix: Bearer              # "Bearer <token>"
    clock-skew-seconds: 30      # 시계 오차 허용
    access-token:
      expiry-seconds: 3600      # 1시간
    refresh-token:
      expiry-seconds: 1209600   # 14일
      cookie:
        name: refresh_token
        same-site: Lax
        http-only: true
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  
  s3:
    bucket: gifpt-s3          # 👉 실제 버킷 이름
    base-url: https://gifpt-s3.s3.ap-northeast-2.amazonaws.com
  upload-dir: ${GIFPT_UPLOAD_DIR:/data/uploads}
  ai-server:
    base-url: ${GIFPT_AI_SERVER_BASE_URL:http://django:8000}

openai:
  api:
    key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o}
