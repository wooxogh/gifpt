spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/gifpt?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true&useUnicode=true
    username: root
    password: Qwerpoiu2@
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      validation-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update      # 로컬 편의 (운영/도커에서는 사용 금지)
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_batch_fetch_size: 100
        query:
          in_clause_parameter_padding: true


server:
  port: 8080

logging:
  level:
    org.springframework: info
    com.gifpt: debug

gifpt:
  jwt:
    secret: ${JWT_SECRET:fqoidjioqwjfoidoivbnqowidfiojqoiwbiowqdfoiwqjfoidjoijoqfiwd}
    expires-in-ms: 3600000           # 1시간
    refresh-expires-in-ms: 1209600000  # 14일
  callback:
    allow-unsigned: true

# ---- 권장: 새 코드에선 @ConfigurationProperties(prefix="security.jwt")로 바인딩 ----
security:
  jwt:
    secret: ${JWT_SECRET:foqijdoifjqwiojfoiwdqjvbiqwdhfoiurhoidwqfoqwuvboqiwdjoiqjiofjoh}
    issuer: gifpt
    header: Authorization
    prefix: Bearer
    clock-skew-seconds: 30
    access-token:
      expiry-seconds: 3600          # 1시간
    refresh-token:
      expiry-seconds: 1209600       # 14일
      cookie:
        name: refresh_token
        same-site: Lax
        http-only: true
        secure: false               # 로컬은 false, 운영은 true
