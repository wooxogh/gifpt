spring:
  datasource:
    url: jdbc:mysql://gifpt-database.c8lmgecqk6vk.us-east-1.rds.amazonaws.com:3306/gifpt-database?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=utf8&allowPublicKeyRetrieval=true&useUnicode=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      connection-timeout: 20000
      validation-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate     # 운영/도커에선 스키마 검증만
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_batch_fetch_size: 100
        query:
          in_clause_parameter_padding: true
  
  servlet:
    multipart:
      max-file-size: 50MB       # 업로드 가능한 파일 최대 크기
      max-request-size: 50MB

server:
  port: 8080

logging:
  level:
    org.springframework: info
    com.gifpt: info
    org.hibernate.SQL: info
    org.hibernate.orm.jdbc.bind: warn

gifpt:
  jwt:
    secret: ${GIFPT_JWT_SECRET}       # 반드시 주입
    expires-in-ms: 3600000         # 1시간
    refresh-expires-in-ms: 1209600000  # 14일
    refresh-token:
      cookie:
        same-site: None
        http-only: true
        secure: true
  s3:
    bucket: gifpt-s3
    base-url: https://gifpt-s3.s3.ap-northeast-2.amazonaws.com
  ai-server:
    base-url: ${GIFPT_AI_SERVER_BASE_URL:http://django:8000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
