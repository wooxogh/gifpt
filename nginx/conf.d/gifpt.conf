map $http_origin $cors_allow_origin {
    default "";
    "~^https://gifpt-front\.vercel\.app$" $http_origin;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 50m;

  # 공통 프록시 헤더
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # CORS 플래그
  set $cors_headers '';
  if ($cors_allow_origin != "") {
      set $cors_headers "true";
  }

  # ------------------------------
  # 1) Preflight for API only
  # ------------------------------
  location ~ ^/api(/|$) {
      if ($request_method = OPTIONS) {
          add_header Access-Control-Allow-Origin $cors_allow_origin always;
          add_header Access-Control-Allow-Credentials "true" always;
          add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
          add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With" always;
          add_header Access-Control-Max-Age "3600" always;
          return 204;
      }

      proxy_pass http://spring:8080;

      if ($cors_headers = "true") {
          add_header Access-Control-Allow-Origin $cors_allow_origin always;
          add_header Access-Control-Allow-Credentials "true" always;
          add_header Access-Control-Expose-Headers "Authorization,Set-Cookie" always;
      }
  }

  # ------------------------------
  # 2) Swagger 허용(프리필터 없이)
  #   → 절대 regex로 묶지 말고
  #   → 별도 처리도 하지 않는다.
  # ------------------------------

  # swagger-ui.html redirect도 Spring이 직접 처리함 (nginx에서 하지 않음)
  # location 블록 제거

  # ------------------------------
  # 3) Default proxy
  # ------------------------------
  location / {
      proxy_pass http://spring:8080;

      if ($cors_headers = "true") {
          add_header Access-Control-Allow-Origin $cors_allow_origin always;
          add_header Access-Control-Allow-Credentials "true" always;
          add_header Access-Control-Expose-Headers "Authorization,Set-Cookie" always;
      }
  }

  # ------------------------------
  # 4) Health
  # ------------------------------
  location = /healthz {
      proxy_pass http://spring:8080/healthz;
  }
}
